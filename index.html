<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <meta name="description" content="Grocery price tracker — compare and log item prices across stores">
  <title>Priced — Grocery Price Tracker</title>
  <link rel="stylesheet" href="main.css?v=1">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏷️</text></svg>">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-top">
        <h1>Priced</h1>
        <button class="btn-icon" id="btn-login" title="Sign in to sync">🔐</button>
      </div>
      <p class="subtitle">Grocery price tracker</p>
      <div class="toolbar">
        <div class="search-wrap">
          <input type="text" id="search" placeholder="Search items..." autocomplete="off">
        </div>
        <select id="filter-store">
          <option value="">All stores</option>
        </select>
        <select id="filter-category">
          <option value="">All categories</option>
        </select>
      </div>
    </header>

    <main id="items-list">
      <div class="empty-state">
        <div class="empty-icon">🛒</div>
        <p>No prices logged yet</p>
        <p class="empty-hint">Tap + to add your first grocery item</p>
      </div>
    </main>

    <button class="fab" id="btn-add" title="Add price">+</button>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Add Price</h2>
      <div class="field">
        <label>Item name</label>
        <input type="text" id="ed-name" placeholder="e.g. Gardenia White Bread" autocomplete="off">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Category</label>
          <div class="chip-row" id="cat-chips"></div>
          <input type="text" id="ed-category" placeholder="Custom category" autocomplete="off" style="display:none;">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Price (RM)</label>
          <input type="number" id="ed-price" placeholder="0.00" step="0.01" min="0">
        </div>
        <div class="field">
          <label>Quantity</label>
          <input type="text" id="ed-qty" placeholder="1 unit / 1kg / 500g">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Store</label>
          <input type="text" id="ed-store" placeholder="e.g. Lotus's, AEON, NSK" autocomplete="off" list="store-list">
          <datalist id="store-list"></datalist>
        </div>
        <div class="field">
          <label>Date</label>
          <input type="date" id="ed-date">
        </div>
      </div>
      <div class="field">
        <label>Notes (optional)</label>
        <input type="text" id="ed-notes" placeholder="e.g. on sale, member price" autocomplete="off">
      </div>
      <div class="modal-actions">
        <button class="btn-danger btn-sm" id="btn-delete" style="display:none;">Delete</button>
        <div class="modal-actions-right">
          <button class="btn-ghost btn-sm" id="btn-cancel">Cancel</button>
          <button class="btn-primary btn-sm" id="btn-save">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="app.js?v=1"></script>
</body>
</html>
